---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: <%= ENV['CHEF_PRODUCT_NAME'] || 'chef' %>
  chef_license: accept-no-persist
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  all_repos: &all_repos_verifier
    inspec_tests:
      - path: test/integration/all_repos
  extra_options: &extra_options_verifier
    inspec_tests:
      - path: test/integration/extra_options
  testing_workflow: &testing_workflow_verifier
    inspec_tests:
      - path: test/integration/testing_workflow

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  all_repos: &all_repos_run_list
    - recipe[test::all_repos]
  extra_options: &extra_options_run_list
    - recipe[test::extra_options]
  testing_workflow: &testing_workflow_run_list
    - recipe[test::testing_workflow]

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier
  - name: all_repos
    run_list: *all_repos_run_list
    verifier: *all_repos_verifier
  - name: extra_options
    run_list: *extra_options_run_list
    verifier: *extra_options_verifier
  - name: testing_workflow
    run_list: *testing_workflow_run_list
    verifier: *testing_workflow_verifier
